<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Smart Cafe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">

    <style>
      :root {
        --primary: #ffb300; /* --brand-yellow */
        --bg-overlay: rgba(59, 0, 13, 0.85); /* --bg-burgundy-dark */
        --glass-bg: rgba(255, 255, 255, 0.08); /* Dark Glass */
        --text-white: #f5f5f5; /* --text-light */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* BACKGROUND IMAGE WITH OVERLAY */
        background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
          url("https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1920&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
      }

      /* --- LOGIN BOX STYLE --- */
      .login-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
      }

      .login-box {
        background: var(--glass-bg);
        padding: 40px 30px;
        border-radius: 15px;
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 5px solid var(--primary);
      }

      .icon-lock {
        font-size: 40px;
        color: var(--primary);
        margin-bottom: 15px;
        background: rgba(255, 159, 13, 0.15);
        width: 80px;
        height: 80px;
        line-height: 80px;
        border-radius: 50%;
        display: inline-block;
      }

      h2 {
        color: var(--text-white);
        margin-bottom: 5px;
        font-weight: 700;
        font-size: 2rem;
      }

      .sub-text {
        color: #aaa;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      /* --- FORM INPUTS --- */
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--primary);
        margin-bottom: 8px;
        display: block;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #555;
        border-radius: 8px;
        font-size: 1rem;
        color: white;
        transition: 0.3s;
        font-family: "Poppins", sans-serif;
      }

      input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 10px rgba(255, 159, 13, 0.3);
      }

      /* --- BUTTON --- */
      .btn-admin {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }

      .btn-admin:hover {
        background: white;
        color: var(--primary);
        transform: translateY(-2px);
      }

      .back-link {
        display: block;
        margin-top: 20px;
        color: #999;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.3s;
      }
      .back-link:hover {
        color: white;
        text-decoration: underline;
      }

      /* --- FOOTER (Fixed at Bottom) --- */
      .site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.9);
        color: #777;
        text-align: center;
        padding: 15px;
        font-size: 12px;
        border-top: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="icon-lock">
          <i class="fas fa-user-shield"></i>
        </div>

        <h2>Admin Portal</h2>
        <p class="sub-text">Authorized Personnel Only | Secure Access</p>

        <form onsubmit="adminLogin(event)">
          <div class="form-group">
            <label>Admin ID</label>
            <input
              type="text"
              id="admin-id"
              placeholder="Enter Admin ID"
              required
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="admin-pass"
              placeholder="Enter Secure Password"
              required
            />
          </div>

          <button type="submit" class="btn-admin">
            <i class="fas fa-sign-in-alt"></i> Secure Login
          </button>
        </form>

        <a href="/" class="back-link">← Back to Main Page</a>
      </div>
    </div>

    <footer class="site-footer">
      &copy; 2025 Smart Cafe Management System | Admin Panel | Areeba Riaz
    </footer>

    <script>
      function adminLogin(event) {
        event.preventDefault(); // Stop refresh

        let id = document.getElementById("admin-id").value.trim();
        let pass = document.getElementById("admin-pass").value;

        // --- 1. VALIDATION (A-Z only) ---
        let nameRegex = /^[A-Za-z]+$/;

        if (!nameRegex.test(id)) {
          alert(
            "❌ Invalid Admin ID!\nOnly letters (A-Z) are allowed. No numbers or special characters."
          );
          return;
        }

        // --- 2. PASSWORD CHECK ---
        if (pass.length < 6) {
          alert("❌ Password too short! Must be at least 6 characters.");
          return;
        }

        // --- 3. CREDENTIALS CHECK ---
        // Asal mein yeh Backend API se check hoga, abhi ke liye Hardcoded hai
        if (id === "admin" && pass === "admin123") {
          // Success
          window.location.href = "/admin/dashboard";
        } else {
          alert("⛔ ACCESS DENIED!\nIncorrect Admin ID or Password.");
        }
      }
    </script>
  </body>
</html>
